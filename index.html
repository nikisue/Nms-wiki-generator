<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NMS Wiki Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;500&display=swap');

  :root {
    --bg: #03060f;
    --bg2: #070d1a;
    --panel: #0a1628;
    --border: #1a3a5c;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --accent3: #7fff6b;
    --text: #c8dff0;
    --muted: #4a6a8a;
    --glow: rgba(0, 212, 255, 0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(0, 80, 160, 0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(0, 212, 255, 0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 80%, rgba(255, 107, 53, 0.04) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: 
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 60%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 70%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 50%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 15%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 90%, rgba(255,255,255,0.2) 0%, transparent 100%);
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px;
  }

  header {
    text-align: center;
    margin-bottom: 50px;
  }

  .logo-text {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    font-weight: 900;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(0, 212, 255, 0.5), 0 0 60px rgba(0, 212, 255, 0.2);
    line-height: 1.2;
  }

  .logo-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.3em;
    margin-top: 8px;
    text-transform: uppercase;
  }

  .divider {
    width: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin: 20px auto;
    opacity: 0.4;
  }

  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 4px;
    padding: 60px 40px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    background: var(--panel);
    position: relative;
    overflow: hidden;
  }

  .upload-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--glow);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .upload-zone:hover::before,
  .upload-zone.drag-over::before {
    opacity: 1;
  }

  .upload-zone:hover,
  .upload-zone.drag-over {
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .upload-icon {
    font-size: 3rem;
    margin-bottom: 16px;
    display: block;
  }

  .upload-label {
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .upload-hint {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 8px;
    font-family: 'Share Tech Mono', monospace;
  }

  #fileInput { display: none; }

  .preview-container {
    display: none;
    margin-top: 20px;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    background: var(--panel);
  }

  .preview-header {
    padding: 10px 16px;
    background: rgba(0, 212, 255, 0.05);
    border-bottom: 1px solid var(--border);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .preview-header span { color: var(--accent3); }

  #previewImg {
    width: 100%;
    max-height: 300px;
    object-fit: contain;
    display: block;
    background: #000;
  }

  .type-selector {
    margin: 24px 0;
  }

  .type-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .type-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .type-btn {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    padding: 8px 16px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    border-radius: 2px;
  }

  .type-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .type-btn.active {
    background: rgba(0, 212, 255, 0.1);
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
  }

  .generate-btn {
    width: 100%;
    padding: 18px;
    font-family: 'Orbitron', monospace;
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    background: transparent;
    border: 2px solid var(--accent);
    color: var(--accent);
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    margin-top: 8px;
  }

  .generate-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: translateX(-100%);
    transition: transform 0.3s ease;
    z-index: 0;
  }

  .generate-btn:hover::before {
    transform: translateX(0);
  }

  .generate-btn:hover {
    color: var(--bg);
  }

  .generate-btn span {
    position: relative;
    z-index: 1;
  }

  .generate-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .generate-btn:disabled::before { display: none; }

  .status-bar {
    display: none;
    margin-top: 20px;
    padding: 14px 20px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    color: var(--accent);
    align-items: center;
    gap: 12px;
  }

  .status-bar.visible { display: flex; }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(0, 212, 255, 0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .output-section {
    display: none;
    margin-top: 24px;
  }

  .output-section.visible { display: block; }

  .output-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .output-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    color: var(--accent3);
    text-transform: uppercase;
  }

  .copy-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    padding: 6px 14px;
    background: transparent;
    border: 1px solid var(--accent3);
    color: var(--accent3);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.1em;
  }

  .copy-btn:hover {
    background: rgba(127, 255, 107, 0.1);
  }

  .copy-btn.copied {
    border-color: var(--accent3);
    color: var(--accent3);
  }

  #outputCode {
    width: 100%;
    min-height: 400px;
    background: #020509;
    border: 1px solid var(--border);
    color: var(--accent3);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.78rem;
    padding: 20px;
    resize: vertical;
    line-height: 1.6;
    outline: none;
    transition: border-color 0.2s;
  }

  #outputCode:focus {
    border-color: var(--accent);
  }

  .error-bar {
    display: none;
    margin-top: 20px;
    padding: 14px 20px;
    background: rgba(255, 50, 50, 0.05);
    border: 1px solid rgba(255, 50, 50, 0.3);
    border-left: 3px solid #ff3232;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    color: #ff6060;
  }

  .error-bar.visible { display: block; }

  footer {
    text-align: center;
    margin-top: 60px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.15em;
  }

  .corner-decoration {
    position: fixed;
    width: 80px;
    height: 80px;
    opacity: 0.15;
    pointer-events: none;
  }
  .corner-decoration.tl { top: 20px; left: 20px; border-top: 1px solid var(--accent); border-left: 1px solid var(--accent); }
  .corner-decoration.br { bottom: 20px; right: 20px; border-bottom: 1px solid var(--accent); border-right: 1px solid var(--accent); }
</style>
</head>
<body>
<div class="stars"></div>
<div class="corner-decoration tl"></div>
<div class="corner-decoration br"></div>

<div class="container">
  <header>
    <div class="logo-text">NMS WIKI<br>GENERATOR</div>
    <div class="logo-sub">Screenshot → MediaWiki Boilerplate</div>
    <div class="divider"></div>
  </header>

  <div class="upload-zone" id="uploadZone">
    <span class="upload-icon">🛸</span>
    <div class="upload-label">Drop Screenshot Here</div>
    <div class="upload-hint">or click to browse · PNG, JPG, WEBP</div>
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <div class="preview-container" id="previewContainer">
    <div class="preview-header">
      LOADED: <span id="fileName">—</span>
    </div>
    <img id="previewImg" alt="Preview">
  </div>

  <div class="type-selector" style="margin-bottom: 0;">
    <div class="type-label">// Anthropic API Key</div>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-..." style="
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s;
      margin-top: 8px;
    ">
  </div>

  <div class="type-selector">
    <div class="type-label">// Page Type</div>
    <div class="type-grid">
      <button class="type-btn active" data-type="creature">Creature</button>
      <button class="type-btn" data-type="planet">Planet</button>
      <button class="type-btn" data-type="moon">Moon</button>
      <button class="type-btn" data-type="system">Star System</button>
      <button class="type-btn" data-type="starship">Starship</button>
      <button class="type-btn" data-type="multitool">Multi-tool</button>
      <button class="type-btn" data-type="base">Base</button>
      <button class="type-btn" data-type="region">Region</button>
    </div>
  </div>

  <button class="generate-btn" id="generateBtn" disabled>
    <span>⬡ Generate Wiki Markup</span>
  </button>

  <div class="status-bar" id="statusBar">
    <div class="spinner"></div>
    <span id="statusText">Analyzing screenshot...</span>
  </div>

  <div class="error-bar" id="errorBar"></div>

  <div class="output-section" id="outputSection">
    <div class="output-header">
      <div class="output-title">// Generated Markup</div>
      <button class="copy-btn" id="copyBtn">[ COPY ]</button>
    </div>
    <textarea id="outputCode" spellcheck="false" readonly></textarea>
  </div>

  <footer>NO MAN'S SKY WIKI GENERATOR · COMMUNITY TOOL · NOT AFFILIATED WITH HELLO GAMES</footer>
</div>

<script>
  const apiKeyInput = document.getElementById('apiKeyInput');
  const uploadZone = document.getElementById('uploadZone');
  const fileInput = document.getElementById('fileInput');
  const previewContainer = document.getElementById('previewContainer');
  const previewImg = document.getElementById('previewImg');
  const fileName = document.getElementById('fileName');
  const generateBtn = document.getElementById('generateBtn');
  const statusBar = document.getElementById('statusBar');
  const statusText = document.getElementById('statusText');
  const errorBar = document.getElementById('errorBar');
  const outputSection = document.getElementById('outputSection');
  const outputCode = document.getElementById('outputCode');
  const copyBtn = document.getElementById('copyBtn');
  const typeBtns = document.querySelectorAll('.type-btn');

  let currentFile = null;
  let currentType = 'creature';

  // Type selection
  typeBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      typeBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentType = btn.dataset.type;
    });
  });

  // Upload zone
  uploadZone.addEventListener('click', () => fileInput.click());
  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) handleFile(file);
  });
  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) handleFile(fileInput.files[0]);
  });

  function handleFile(file) {
    currentFile = file;
    fileName.textContent = file.name;
    const reader = new FileReader();
    reader.onload = e => {
      previewImg.src = e.target.result;
      previewContainer.style.display = 'block';
      generateBtn.disabled = false;
    };
    reader.readAsDataURL(file);
  }

  // Generate
  generateBtn.addEventListener('click', async () => {
    if (!currentFile) return;

    generateBtn.disabled = true;
    statusBar.classList.add('visible');
    errorBar.classList.remove('visible');
    outputSection.classList.remove('visible');
    statusText.textContent = 'Scanning screenshot with Claude vision...';

    try {
      const base64 = await fileToBase64(currentFile);
      const mediaType = currentFile.type || 'image/png';
      const prompt = buildPrompt(currentType);

      statusText.textContent = 'Extracting wiki data...';

      const apiKey = apiKeyInput.value.trim();
      if (!apiKey) {
        errorBar.textContent = 'Error: Please enter your Anthropic API key.';
        errorBar.classList.add('visible');
        generateBtn.disabled = false;
        statusBar.classList.remove('visible');
        return;
      }

      const response = await fetch('https://long-hill-af27.nikisue9.workers.dev/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          messages: [{
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
              { type: 'text', text: prompt }
            ]
          }]
        })
      });

      const data = await response.json();
      if (data.error) throw new Error(data.error.message);

      const text = data.content.map(b => b.text || '').join('');
      outputCode.value = text.trim();
      outputSection.classList.add('visible');
      statusBar.classList.remove('visible');
    } catch (err) {
      statusBar.classList.remove('visible');
      errorBar.textContent = 'Error: ' + err.message;
      errorBar.classList.add('visible');
    } finally {
      generateBtn.disabled = false;
    }
  });

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }
